<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 卡片資料庫生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        #h-resizer { cursor: ns-resize; }
        #v-resizer { cursor: col-resize; }
        .lang-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .card-icon-container { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; }
        .card-icon-img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col font-sans text-slate-900">

    <header class="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>📇</span> <span data-i18n="title">卡片資料庫工具</span>
            </h1>
            <div class="flex items-center bg-slate-700 rounded px-3 py-1 text-sm border border-slate-600">
                <span class="text-slate-400 mr-2" data-i18n="pathLabel">路徑:</span>
                <input type="text" id="configPath" value="tosm.data.card" oninput="updatePreview()" class="bg-transparent text-blue-300 outline-none w-48 font-mono">
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex bg-slate-700 rounded p-1 border border-slate-600">
                <button onclick="changeLanguage('zh')" id="lang-zh" class="lang-btn px-3 py-1 rounded text-sm text-slate-300">繁中</button>
                <button onclick="changeLanguage('ja')" id="lang-ja" class="lang-btn px-3 py-1 rounded text-sm text-slate-300">日本語</button>
            </div>
            <button onclick="importJSON()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm transition" data-i18n="btnImport">匯入 JSON</button>
            <button onclick="exportJSON()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm transition" data-i18n="btnExport">匯出 JSON</button>
            <input type="file" id="fileInput" class="hidden" accept=".json" onchange="handleFileSelect(event)">
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- 列表區 -->
        <aside id="sidebar" class="w-80 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="font-semibold text-gray-700"><span data-i18n="listTitle">卡片列表</span> (<span id="cardCount">0</span>)</h2>
                <button onclick="addNewCard()" class="bg-blue-100 text-blue-600 hover:bg-blue-200 w-8 h-8 rounded-full flex items-center justify-center font-bold transition">+</button>
            </div>
            <div id="cardList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2"></div>
        </aside>

        <div id="v-resizer" class="w-1 bg-gray-200 hover:bg-blue-400 shrink-0 z-20"></div>

        <!-- 編輯區 -->
        <section id="editorSection" class="flex-1 flex flex-col overflow-hidden bg-white">
            <div id="noSelection" class="flex-1 flex items-center justify-center text-gray-400">
                <p data-i18n="noSelect">請選擇左側卡片或點擊「+」新增資料</p>
            </div>

            <div id="editorPanel" class="hidden flex-1 flex flex-col overflow-hidden">
                <div id="topPanel" class="flex-[2] overflow-y-auto p-6 space-y-6 custom-scrollbar">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-lg text-gray-800" data-i18n="editArea">編輯區域</h3>
                        <button onclick="handleDeleteCard()" class="text-red-600 hover:text-red-800 text-sm font-bold" data-i18n="btnDelete">刪除此卡片</button>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">ID</label><input type="text" id="edit-id" oninput="updateCurrentData()" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelImg">圖示</label><input type="text" id="edit-img" oninput="updateCurrentData()" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelRarity">稀有度</label><select id="edit-rarity" onchange="updateCurrentData()" class="w-full border rounded p-2 outline-none"></select></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="md:col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelEffect">效果標籤</label>
                            <select id="edit-effectTag" onchange="handleEffectChange()" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                        </div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">ValueBase</label><input type="number" id="edit-vbase" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Value/Lv</label><input type="number" id="edit-vpl" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Value/Lv11</label><input type="number" id="edit-vpl11" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs text-gray-500 mb-1">中文名稱</label><input type="text" id="edit-name-zh" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                        <div><label class="block text-xs text-gray-500 mb-1">日文名稱</label><input type="text" id="edit-name-ja" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                    </div>

                    <div class="space-y-3">
                        <div><label class="block text-xs text-gray-500 mb-1">中文描述</label><input type="text" id="edit-desc-zh" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                        <div><label class="block text-xs text-gray-500 mb-1">日文描述</label><input type="text" id="edit-desc-ja" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                    </div>
                </div>

                <div id="h-resizer" class="h-1 bg-gray-300 hover:bg-blue-400 shrink-0 z-20"></div>

                <div id="bottomPanel" class="flex-1 flex flex-col bg-gray-900 overflow-hidden">
                    <div class="px-4 py-2 text-gray-400 text-xs font-mono flex justify-between">
                        <span>JSON PREVIEW</span>
                        <button onclick="copyFullJSON()" class="hover:text-white">COPY ALL</button>
                    </div>
                    <pre id="jsonPreview" class="flex-1 overflow-auto p-4 text-green-400 font-mono text-sm custom-scrollbar"></pre>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity pointer-events-none z-50"></div>

    <script>
        const effectOptions = [
            { val: 'ALL', zh: '全部 (All)', ja: 'すべて (All)' },
            { val: '0', zh: '最大 HP 提升', ja: '最大HPアップ' },
            { val: '1', zh: '最大 SP 提升', ja: '最大SPアップ' },
            { val: '2', zh: '攻擊力提升', ja: '攻撃力アップ' },
            { val: '3', zh: '防禦力提升', ja: '防御力アップ' },
            { val: '4', zh: '格擋提升', ja: 'ブロックアップ' },
            { val: '5', zh: '命中提升', ja: '命中アップ' },
            { val: '6', zh: '貫通提升', ja: '貫通アップ' },
            { val: '7', zh: '迴避提升', ja: '回避アップ' },
            { val: '8', zh: '暴擊發生提升', ja: 'クリティカル発生アップ' },
            { val: '9', zh: '暴擊抵抗提升', ja: 'クリティカル抵抗アップ' },
            { val: '10', zh: '暴擊傷害提升', ja: 'クリティカルダメージアップ' },
            { val: '11', zh: '火屬性對象攻擊時傷害量', ja: '火属性対象攻撃時のダメージ量' },
            { val: '12', zh: '冰屬性對象攻擊時傷害量', ja: '氷属性対象攻撃時のダメージ量' },
            { val: '13', zh: '雷屬性對象攻擊時傷害量', ja: '雷属性対象攻撃時のダメージ量' },
            { val: '14', zh: '土屬性對象攻擊時傷害量', ja: '土属性対象攻撃時のダメージ量' },
            { val: '15', zh: '暗屬性對象攻擊時傷害量', ja: '闇属性対象攻撃時のダメージ量' },
            { val: '16', zh: '神聖屬性對象攻擊時傷害量', ja: '神聖属性対象攻撃時のダメージ量' },
            { val: '17', zh: 'SP 自然恢復提升', ja: 'SP自然回復アップ' },
            { val: '18', zh: '技能傷害提升', ja: 'スキルダメージアップ' },
            { val: '19', zh: '移動速度提升', ja: '移動速度アップ' },
            { val: '20', zh: '攻擊速度提升', ja: '攻撃速度アップ' },
            { val: '21', zh: '技能冷卻時間縮短', ja: 'スキルクールタイム短縮' },
            { val: '22', zh: '庫波爾冷卻時間縮短', ja: 'クポルクールタイム短縮' },
            { val: '23', zh: '控制狀態持續時間減少', ja: '制御状態の持続時間ダウン' },
            { val: '24', zh: '普攻 SP 恢復+', ja: '通常攻撃SP回復+' },
            { val: '25', zh: '非戰鬥 SP 恢復+', ja: '非戦闘SP回復+' },
            { val: '26', zh: '暴擊發生時傷害 2 倍', ja: 'クリティカル発生時、ダメージ2倍' },
            { val: '27', zh: '受到射擊攻擊時，格擋提升', ja: '射撃攻撃を受けた時、ブロックアップ' },
            { val: '28', zh: '受到物理攻擊時，格擋提升', ja: '物理攻撃を受けた時、ブロックアップ' },
            { val: '29', zh: '受到魔法攻擊時，格擋提升', ja: '魔法攻撃を受けた時、ブロックアップ' },
            { val: '30', zh: '受到射擊攻擊時，迴避提升', ja: '射撃攻撃を受けた時、回避アップ' },
            { val: '31', zh: '受到物理攻擊時，迴避提升', ja: '物理攻撃を受けた時、回避アップ' },
            { val: '32', zh: '受到魔法攻擊時，迴避提升', ja: '魔法攻撃を受けた時、回避アップ' },
            { val: '33', zh: '對野獸型敵人造成的傷害量', ja: '野獣型の敵へ与えるダメージ量' },
            { val: '34', zh: '對惡魔型敵人造成的傷害量', ja: '悪魔型の敵へ与えるダメージ量' },
            { val: '35', zh: '對昆蟲型敵人造成的傷害量', ja: '昆虫型の敵へ与えるダメージ量' },
            { val: '36', zh: '對變異型敵人造成的傷害量', ja: '變異型の敵へ与えるダメージ量' },
            { val: '37', zh: '對植物型敵人造成的傷害量', ja: '植物型の敵へ与えるダメージ量' },
            { val: '38', zh: '對王怪造成的傷害量', ja: 'ボスへ与えるダメージ量' },
            { val: '39', zh: '從野獸型敵人受到的傷害量', ja: '野獣型の敵から受けるダメージ量' },
            { val: '40', zh: '從惡魔型敵人受到的傷害量', ja: '悪魔型の敵から受けるダメージ量' },
            { val: '41', zh: '從昆蟲型敵人受到的傷害量', ja: '昆虫型の敵から受けるダメージ量' },
            { val: '42', zh: '從變異型敵人受到的傷害量', ja: '変異型の敵から受けるダメージ量' },
            { val: '43', zh: '從植物型敵人受到的傷害量', ja: '植物型の敵から受けるダメージ量' },
            { val: '44', zh: '受到物理攻擊時，受到的傷害量', ja: '物理攻撃を受けた時 、受けるダメージ量' },
            { val: '45', zh: '受到射擊攻擊時，受到的傷害量', ja: '射撃攻撃を受けた時 、受けるダメージ量' },
            { val: '46', zh: '受到魔法攻擊時，受到的傷害量', ja: '魔法攻撃を受けた時 、受けるダメージ量' },
            { val: '47', zh: '從王怪受到的傷害量', ja: 'ボスから受けるダメージ量' },
            { val: '48', zh: '夥伴受到的傷害量', ja: 'フェローの受けるダメージ' },
            { val: '49', zh: '夥伴造成的傷害量', ja: 'フェローが与えるダメージ量' },
            { val: '50', zh: '同行夥伴每增加1人，玩家造成的傷害量', ja: '同行中のフェローの人数1人につき、プレイヤーが與えるダメージ量' },
            { val: '51', zh: '暴擊傷害 +', ja: 'クリティカルダメージ+' },
            { val: '52', zh: '防禦力下降，攻擊力提升', ja: '防御力ダウン、攻撃力アップ' },
            { val: '53', zh: '忍耐提升', ja: '忍耐アップ' },
            { val: '54', zh: '物理系狀態異常無視率', ja: '物理系の状態異常無視率' },
            { val: '55', zh: '元素系狀態異常無視率', ja: '元素系の状態異常無視率' },
            { val: '56', zh: '精神系狀態異常無視率', ja: '精神系の状態異常無視率' },
            { val: '57', zh: '庫波爾攻擊技能傷害提升', ja: 'クポルの攻撃スキルダメージアップ' },
            { val: '58', zh: '對精神系狀態異常的敵人傷害提升', ja: '精神系の状態異常の敵に対してダメージアップ' },
            { val: '59', zh: '對元素系狀態異常的敵人傷害提升', ja: '元素系の状態異常の敵に対してダメージアップ' },
            { val: '60', zh: '對物理系狀態異常的敵人傷害提升', ja: '物理系の状態異常の敵に対してダメージアップ' },
            { val: '61', zh: '自身剩餘 HP 越少，傷害量提升', ja: '自身の残りHPが少ないほどダメージ量アップ' },
            { val: '62', zh: '自身剩餘 HP 越多，傷害量提升', ja: '自身的残りHPが多いほどダメージ量アップ' }
        ];

        const rarityOptions = [
            { val: 'Constellation', zh: '星座', ja: '星座' },
            { val: 'Goddess', zh: '女神', ja: '女神' },
            { val: 'Legend', zh: '傳說', ja: '伝説' },
            { val: 'Hero', zh: '英雄', ja: '英雄' },
            { val: 'Rare', zh: '稀少', ja: '希少' }
        ];

        const i18n = {
            zh: { title: "卡片資料庫工具", pathLabel: "路徑:", btnImport: "匯入 JSON", btnExport: "匯出 JSON", listTitle: "卡片列表", noSelect: "請選擇卡片或點擊「+」", editArea: "編輯區域", btnDelete: "刪除卡片", labelImg: "圖示", labelRarity: "稀有度", labelEffect: "效果標籤" },
            ja: { title: "カードデータベース", pathLabel: "パス:", btnImport: "インポート", btnExport: "エクスポート", listTitle: "カード一覧", noSelect: "カードを選択してください", editArea: "編集エリア", btnDelete: "削除", labelImg: "アイコン", labelRarity: "レアリティ", labelEffect: "効果タグ" }
        };

        let currentLang = 'zh';
        let cards = [];
        let currentIndex = -1;

        window.onload = () => {
            updateRaritySelect();
            updateEffectSelect();
            changeLanguage('zh');
            initResizers();
        };

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `lang-${lang}`));
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            updateRaritySelect();
            updateEffectSelect();
            renderList();
        }

        function updateRaritySelect() {
            const s = document.getElementById('edit-rarity');
            const cur = s.value; s.innerHTML = '';
            rarityOptions.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o.val; opt.innerText = o[currentLang];
                s.appendChild(opt);
            });
            if (cur) s.value = cur;
        }

        function updateEffectSelect() {
            const s = document.getElementById('edit-effectTag');
            const cur = s.value; s.innerHTML = '';
            effectOptions.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o.val;
                const lab = currentLang === 'ja' ? o.ja : o.zh;
                opt.innerText = `${o.val}：${lab}`;
                s.appendChild(opt);
            });
            if (cur) s.value = cur;
        }

        function renderList() {
            const list = document.getElementById('cardList');
            document.getElementById('cardCount').innerText = cards.length;
            list.innerHTML = '';
            cards.forEach((card, i) => {
                const active = i === currentIndex;
                const div = document.createElement('div');
                div.className = `p-3 rounded border cursor-pointer transition flex items-center gap-3 ${active ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-blue-300'}`;
                div.onclick = () => loadEditor(i);
                const name = card.name[currentLang] || card.name.zh || 'No Name';
                div.innerHTML = `<div class="card-icon-container"><span>${card.img.startsWith('http') ? '<img src="'+card.img+'" class="card-icon-img">' : card.img}</span></div><div class="flex-1 overflow-hidden"><div class="text-[10px] text-gray-400 font-mono">${card.id}</div><div class="font-bold text-sm truncate">${name}</div></div>`;
                list.appendChild(div);
            });
        }

        function loadEditor(index) {
            currentIndex = index;
            const card = cards[index];
            document.getElementById('noSelection').classList.add('hidden');
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('edit-id').value = card.id || '';
            document.getElementById('edit-img').value = card.img || '';
            document.getElementById('edit-rarity').value = card.rarity || 'Hero';
            document.getElementById('edit-effectTag').value = card.effectTag || 'ALL';
            document.getElementById('edit-vbase').value = card.valueBase || 0;
            document.getElementById('edit-vpl').value = card.valuePerLevel || 0;
            document.getElementById('edit-vpl11').value = card.valuePerLevelLv11 || 0;
            document.getElementById('edit-name-zh').value = card.name.zh || '';
            document.getElementById('edit-name-ja').value = card.name.ja || '';
            document.getElementById('edit-desc-zh').value = card.desc.zh || '';
            document.getElementById('edit-desc-ja').value = card.desc.ja || '';
            updatePreview(); renderList();
        }

        function handleEffectChange() {
            const val = document.getElementById('edit-effectTag').value;
            const opt = effectOptions.find(o => o.val === val);
            if (opt && val !== 'ALL') {
                document.getElementById('edit-desc-zh').value = `${opt.zh}+{v}%`;
                document.getElementById('edit-desc-ja').value = `${opt.ja}+{v}%`;
            }
            updateCurrentData();
        }

        function updateCurrentData() {
            if (currentIndex === -1) return;
            cards[currentIndex] = {
                id: document.getElementById('edit-id').value,
                img: document.getElementById('edit-img').value,
                rarity: document.getElementById('edit-rarity').value,
                effectTag: document.getElementById('edit-effectTag').value,
                valueBase: Number(document.getElementById('edit-vbase').value),
                valuePerLevel: Number(document.getElementById('edit-vpl').value),
                valuePerLevelLv11: Number(document.getElementById('edit-vpl11').value),
                name: { zh: document.getElementById('edit-name-zh').value, ja: document.getElementById('edit-name-ja').value },
                desc: { zh: document.getElementById('edit-desc-zh').value, ja: document.getElementById('edit-desc-ja').value }
            };
            updatePreview(); renderList();
        }

        function addNewCard() {
            const card = { id: "card_new", img: "❓", rarity: "Hero", effectTag: "ALL", valueBase: 0, valuePerLevel: 0, valuePerLevelLv11: 0, name: { zh: "新卡片", ja: "新カード" }, desc: { zh: "", ja: "" } };
            cards.unshift(card); loadEditor(0);
        }

        function handleDeleteCard() {
            if (currentIndex === -1) return;
            cards.splice(currentIndex, 1); currentIndex = -1;
            document.getElementById('editorPanel').classList.add('hidden');
            document.getElementById('noSelection').classList.remove('hidden');
            renderList(); updatePreview();
        }

        function updatePreview() {
            const path = document.getElementById('configPath').value.split('.');
            let output = cards;
            for (let i = path.length - 1; i >= 0; i--) { output = { [path[i]]: output }; }
            document.getElementById('jsonPreview').textContent = JSON.stringify(output, null, 2);
        }

        function copyFullJSON() {
            const txt = document.getElementById('jsonPreview').textContent;
            navigator.clipboard.writeText(txt);
            showToast("Copied!");
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        }

        function exportJSON() {
            const blob = new Blob([document.getElementById('jsonPreview').textContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'cards.json'; a.click();
        }

        function importJSON() { document.getElementById('fileInput').click(); }
        function handleFileSelect(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const json = JSON.parse(ev.target.result);
                    const path = document.getElementById('configPath').value.split('.');
                    let data = json;
                    path.forEach(k => { if (data[k]) data = data[k]; });
                    cards = Array.isArray(data) ? data : [];
                    renderList(); updatePreview();
                } catch (err) { alert("Invalid JSON"); }
            };
            reader.readAsText(file);
        }

        function initResizers() {
            let isResizingV = false, isResizingH = false;
            document.getElementById('v-resizer').onmousedown = () => isResizingV = true;
            document.getElementById('h-resizer').onmousedown = () => isResizingH = true;
            document.onmousemove = (e) => {
                if (isResizingV) document.getElementById('sidebar').style.width = e.clientX + 'px';
                if (isResizingH) {
                    const rect = document.getElementById('editorSection').getBoundingClientRect();
                    const h = e.clientY - rect.top;
                    document.getElementById('topPanel').style.flex = `0 0 ${h}px`;
                }
            };
            document.onmouseup = () => isResizingV = isResizingH = false;
        }
    </script>
</body>
</html>
