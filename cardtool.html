<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 卡片資料庫生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        #cardList {
            scroll-behavior: smooth;
        }
        #h-resizer {
            cursor: ns-resize;
            transition: background 0.2s;
        }
        #h-resizer:hover {
            background: #3b82f6;
        }
        #v-resizer {
            cursor: col-resize;
            transition: background 0.2s;
        }
        #v-resizer:hover {
            background: #3b82f6;
        }
        .resizing-v {
            cursor: col-resize;
            user-select: none;
        }
        .resizing-h {
            cursor: ns-resize;
            user-select: none;
        }
        .card-icon-container {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }
        .card-icon-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .card-icon-emoji {
            font-size: 28px;
        }
        .lang-btn {
            transition: all 0.2s;
        }
        .lang-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .title-wrapped {
            width: 8.5rem; 
            display: inline-block;
            word-break: break-all;
            line-height: 1.2;
            vertical-align: top;
        }
        .btn-text-wrapped {
            display: inline-block;
            width: 4.5rem; 
            word-break: break-all;
            line-height: 1.2;
            vertical-align: middle;
            text-align: center;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        #firebaseModal {
            background: rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col font-sans text-slate-900">

    <header class="bg-slate-800 text-white p-4 shadow-md flex flex-wrap justify-between items-start z-10 gap-4">
        <div class="flex items-start gap-4">
            <h1 class="text-xl font-bold flex items-start gap-2 shrink-0">
                <span class="mt-1">📇</span> 
                <span data-i18n="title" class="title-wrapped">卡片資料庫工具</span>
            </h1>
            <div class="flex items-center bg-slate-700 rounded px-3 py-1 text-sm border border-slate-600 mt-1">
                <span class="text-slate-400 mr-2 shrink-0" data-i18n="pathLabel">路徑層級:</span>
                <input type="text" id="configPath" value="tosm.data.card" 
                       oninput="updatePreview()"
                       class="bg-transparent text-blue-300 outline-none w-48 font-mono" 
                       placeholder="例如: root.data.items">
            </div>

            <div class="flex items-center gap-3 bg-slate-900/50 p-2 rounded border border-slate-700 mt-1">
                <div class="flex items-center gap-2">
                    <span id="connStatus" class="status-dot bg-gray-500"></span>
                    <span class="text-[10px] text-slate-400 font-mono">Firebase</span>
                </div>
                <button onclick="toggleFirebaseConn()" id="btnFbConn" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded transition-colors">連線</button>
                <button onclick="openFbConfig()" class="text-xs text-slate-400 hover:text-white transition-colors">⚙️</button>
                <button onclick="manualPushFirebase()" id="btnFbPush" class="hidden text-xs bg-orange-600 hover:bg-orange-700 px-2 py-1 rounded font-bold transition-colors">更新雲端</button>
            </div>
        </div>
        
        <div class="flex items-center gap-4 mt-1">
            <div class="flex bg-slate-700 rounded p-1 border border-slate-600">
                <button onclick="changeLanguage('zh')" id="lang-zh" class="lang-btn px-3 py-1 rounded text-sm text-slate-300 hover:text-white">繁中</button>
                <button onclick="changeLanguage('ja')" id="lang-ja" class="lang-btn px-3 py-1 rounded text-sm text-slate-300 hover:text-white">日本語</button>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="importJSON()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded text-sm transition flex items-center justify-center min-h-[44px]">
                    <span data-i18n="btnImport" class="btn-text-wrapped">匯入 JSON</span>
                </button>
                <button onclick="exportJSON()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded text-sm transition flex items-center justify-center min-h-[44px]">
                    <span data-i18n="btnExport" class="btn-text-wrapped">匯出 JSON</span>
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".json" onchange="handleFileSelect(event)">
            </div>
        </div>
    </header>

    <div id="firebaseModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-4 border-b bg-gray-50 font-bold flex justify-between items-center">
                <span>Firebase RTDB 專案設定</span>
                <button onclick="closeFbConfig()" class="text-gray-400 hover:text-black">✕</button>
            </div>
            <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-wider uppercase">API Key</label>
                    <input type="text" id="fb-apiKey" class="w-full border rounded p-2 text-sm font-mono focus:border-blue-500 outline-none" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-wider uppercase">Auth Domain</label>
                    <input type="text" id="fb-authDomain" class="w-full border rounded p-2 text-sm font-mono focus:border-blue-500 outline-none" placeholder="project-id.firebaseapp.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-wider uppercase">Database URL</label>
                    <input type="text" id="fb-url" class="w-full border rounded p-2 text-sm font-mono focus:border-blue-500 outline-none" placeholder="https://project-id.firebaseio.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-wider uppercase">Project ID</label>
                    <input type="text" id="fb-projectId" class="w-full border rounded p-2 text-sm font-mono focus:border-blue-500 outline-none" placeholder="project-id">
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2">
                <button onclick="closeFbConfig()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-200 rounded">取消</button>
                <button onclick="saveFbConfig()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">儲存設定</button>
            </div>
        </div>
    </div>

    <main class="flex-1 flex overflow-hidden">
        <aside id="sidebar" class="w-80 bg-white border-r border-gray-200 flex flex-col shrink-0 min-w-[200px] max-w-[600px]">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="font-semibold text-gray-700 truncate">
                    <span data-i18n="listTitle">卡片列表</span> (<span id="cardCount">0</span>)
                </h2>
                <button onclick="addNewCard()" class="bg-blue-100 text-blue-600 hover:bg-blue-200 w-8 h-8 rounded-full flex items-center justify-center font-bold transition shrink-0">+</button>
            </div>
            <div id="cardList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2"></div>
        </aside>

        <div id="v-resizer" class="w-1 bg-gray-200 hover:bg-blue-400 shrink-0 z-20"></div>

        <section id="editorSection" class="flex-1 flex flex-col overflow-hidden bg-white">
            <div id="noSelection" class="flex-1 flex items-center justify-center text-gray-400">
                <div class="text-center">
                    <p class="text-5xl mb-4">📝</p>
                    <p data-i18n="noSelect">請選擇左側卡片或點擊「+」新增資料</p>
                </div>
            </div>

            <div id="editorPanel" class="hidden flex-1 flex flex-col overflow-hidden">
                <div id="topPanel" class="flex-[2] flex flex-col min-h-[100px]">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                        <h3 class="font-bold text-gray-800" data-i18n="editArea">編輯區域</h3>
                        <button type="button" onclick="handleDeleteCard()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                            <span>🗑️</span>
                            <span data-i18n="btnDelete">刪除此卡片</span>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelId">ID</label>
                                <input type="text" id="edit-id" oninput="updateCurrentData()" placeholder="例如: card_001" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelImg">圖示</label>
                                <input type="text" id="edit-img" oninput="updateCurrentData()" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelRarity">稀有度</label>
                                <select id="edit-rarity" onchange="updateCurrentData()" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelEffect">效果標籤</label>
                                <select id="edit-effectTag" onchange="updateCurrentData()" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                            </div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">ValueBase</label><input type="number" id="edit-vbase" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Value/Lv</label><input type="number" id="edit-vpl" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Value/Lv11</label><input type="number" id="edit-vpl11" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                        </div>

                        <hr>
                        <div>
                            <h4 class="font-semibold text-gray-700 mb-2 text-blue-600" data-i18n="groupName">卡片名稱</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs text-gray-500 mb-1">中文</label><input type="text" id="edit-name-zh" oninput="updateCurrentData()" class="w-full border rounded p-2 outline-none"></div>
                                <div><label class="block text-xs text-gray-500 mb-1">日文</label><input type="text" id="edit-name-ja" oninput="updateCurrentData()" class="w-full border rounded p-2 outline-none"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <h4 class="font-semibold text-gray-700 text-blue-600" data-i18n="groupDesc">卡片敘述</h4>
                                <span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded border border-amber-200" data-i18n="descNotice">注意: {v} 為參數值</span>
                            </div>
                            <div class="space-y-3">
                                <div><label class="block text-xs text-gray-500 mb-1">中文描述</label><input type="text" id="edit-desc-zh" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                                <div><label class="block text-xs text-gray-500 mb-1">日文描述</label><input type="text" id="edit-desc-ja" oninput="updateCurrentData()" class="w-full border rounded p-2"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="h-resizer" class="h-1 bg-gray-300 hover:bg-blue-400 shrink-0 z-20"></div>

                <div id="bottomPanel" class="flex-1 flex flex-col min-h-[50px]">
                    <div class="px-4 py-2 bg-gray-800 text-gray-400 text-xs font-mono shrink-0 flex justify-between items-center">
                        <span data-i18n="previewLabel">JSON 即時預覽</span>
                        <div class="flex gap-4">
                            <button onclick="copyFullJSON()" class="hover:text-white transition" data-i18n="btnCopyFull">複製全域 JSON</button>
                            <button onclick="copyCurrentJSON()" class="hover:text-white transition" data-i18n="btnCopySingle">複製單筆 JSON</button>
                        </div>
                    </div>
                    <div class="flex-1 overflow-auto bg-gray-900 p-4 custom-scrollbar">
                        <pre id="jsonPreview" class="text-green-400 font-mono text-sm"></pre>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

            { val: '51', lab: { zh: '夥伴受到的傷害量', ja: 'フェローの受けるダメージ' } },
            { val: '52', lab: { zh: '防禦力下降，攻擊力提升', ja: '防御力ダウン、攻撃力アップ' } },
            { val: '53', lab: { zh: '精神系異常狀態無視率', ja: '精神系の狀態異常無視の率' } },
            { val: '54', lab: { zh: '對精神系異常狀態敵人傷害提升', ja: '精神系の狀態異常的敵に対してダメージアップ' } },
            { val: '55', lab: { zh: '受到惡魔型敵人傷害量', ja: '惡魔型の敵から受けるダメージ量' } },
            { val: '56', lab: { zh: '受到射擊攻擊時受到的傷害量', ja: '射撃攻撃を受けた時 、受けるダメージ量' } },
            { val: '57', lab: { zh: '夥伴造成的傷害量', ja: 'フェローが與えるダメージ量' } },
            { val: '58', lab: { zh: '忍耐提升', ja: '忍耐アップ' } },
            { val: '59', lab: { zh: '庫波爾攻擊技能傷害提升', ja: 'クポルの攻撃スキルダメージアップ' } },
            { val: '60', lab: { zh: '自身剩餘 HP 越少傷害量提升', ja: '自身的残りHPが少ないほどダメージ量アップ' } }
        ];

        const i18n = {
            zh: {
                title: "卡片資料庫工具", pathLabel: "路徑層級:", btnImport: "匯入 JSON", btnExport: "匯出 JSON",
                listTitle: "卡片列表", noSelect: "請選擇左側卡片或點擊「+」新增資料", editArea: "編輯區域",
                btnDelete: "刪除此卡片", labelId: "ID", labelImg: "圖示",
                labelRarity: "稀有度", labelEffect: "效果標籤", groupName: "卡片名稱",
                groupDesc: "卡片敘述", descNotice: "注意: {v} 為參數值", previewLabel: "JSON 即時預覽",
                btnCopyFull: "複製全域 JSON", btnCopySingle: "複製單筆 JSON", msgCopied: "已複製",
                msgAdded: "已新增", msgDeleted: "已刪除", msgImported: "匯入成功",
                msgExported: "準備下載", confirmDelete: "確定要刪除此卡片嗎？\n此動作將永久移除資料且無法復原。", noCards: "無資料"
            },
            ja: {
                title: "カードデータベースツール", pathLabel: "パス階層:", btnImport: "JSONインポート", btnExport: "JSONエクスポート",
                listTitle: "カード一覧", noSelect: "カードを選択してください", editArea: "編集エリア",
                btnDelete: "このカードを削除", labelId: "ID", labelImg: "アイコン",
                labelRarity: "レアリティ", labelEffect: "効果タグ", groupName: "カード名",
                groupDesc: "説明文", descNotice: "注意: {v} はパラメータ値です", previewLabel: "JSON プレビュー",
                btnCopyFull: "全体コピー", btnCopySingle: "単品コピー", msgCopied: "コピー完了",
                msgAdded: "追加完了", msgDeleted: "削除完了", msgImported: "インポート完了",
                msgExported: "準備完了", confirmDelete: "このカードを削除しますか？\nこの操作は取り消せません。", noCards: "データなし"
            }
        };

        let currentLang = 'zh';
        let cards = [];
        let currentIndex = -1;
        let isFbConnected = false;
        let fbRef = null;

        window.onload = () => {
            changeLanguage('zh');
            initResizers();
            loadFbConfig();
        };

        function openFbConfig() { document.getElementById('firebaseModal').style.display = 'flex'; }
        function closeFbConfig() { document.getElementById('firebaseModal').style.display = 'none'; }
        
        // 載入完整的 4 個 Firebase 參數
        function loadFbConfig() { 
            document.getElementById('fb-apiKey').value = localStorage.getItem('fb_apiKey') || '';
            document.getElementById('fb-authDomain').value = localStorage.getItem('fb_authDomain') || '';
            document.getElementById('fb-url').value = localStorage.getItem('fb_db_url') || '';
            document.getElementById('fb-projectId').value = localStorage.getItem('fb_projectId') || '';
        }

        // 儲存完整的 4 個 Firebase 參數
        function saveFbConfig() {
            localStorage.setItem('fb_apiKey', document.getElementById('fb-apiKey').value);
            localStorage.setItem('fb_authDomain', document.getElementById('fb-authDomain').value);
            localStorage.setItem('fb_db_url', document.getElementById('fb-url').value);
            localStorage.setItem('fb_projectId', document.getElementById('fb-projectId').value);
            showToast("Firebase 設定已儲存");
            closeFbConfig();
        }

        function toggleFirebaseConn() {
            if (isFbConnected) {
                if (fbRef) fbRef.off();
                isFbConnected = false;
                updateStatusUI(false);
                showToast("Firebase 已斷線");
            } else {
                const config = {
                    apiKey: document.getElementById('fb-apiKey').value,
                    authDomain: document.getElementById('fb-authDomain').value,
                    databaseURL: document.getElementById('fb-url').value,
                    projectId: document.getElementById('fb-projectId').value
                };
                
                if (!config.databaseURL) return showToast("請至少填寫 Database URL");
                
                try {
                    if (firebase.apps.length > 0) {
                        firebase.app().delete().then(() => initFirebase(config));
                    } else {
                        initFirebase(config);
                    }
                } catch (e) { 
                    console.error(e);
                    showToast("連線失敗，請檢查參數"); 
                }
            }
        }

        function initFirebase(config) {
            firebase.initializeApp(config);
            const path = document.getElementById('configPath').value.replace(/\./g, '/');
            fbRef = firebase.database().ref(path);
            fbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && Array.isArray(data)) {
                    cards = data; renderList(); updatePreview(); showToast("已同步雲端資料");
                }
            });
            isFbConnected = true; updateStatusUI(true); showToast("Firebase 連線成功");
        }

        function updateStatusUI(connected) {
            const statusDot = document.getElementById('connStatus');
            const btnConn = document.getElementById('btnFbConn');
            const btnPush = document.getElementById('btnFbPush');
            if (connected) {
                statusDot.className = 'status-dot bg-green-500';
                btnConn.innerText = '中斷';
                btnPush.classList.remove('hidden');
            } else {
                statusDot.className = 'status-dot bg-gray-500';
                btnConn.innerText = '連線';
                btnPush.classList.add('hidden');
            }
        }

        function manualPushFirebase() {
            if (!isFbConnected || !fbRef) return;
            fbRef.set(cards).then(() => showToast("雲端資料已手動更新！"));
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.id === `lang-${lang}`));
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            updateRaritySelect();
            updateEffectSelect();
            renderList();
        }

        function updateRaritySelect() {
            const selectEl = document.getElementById('edit-rarity');
            const cur = selectEl.value;
            selectEl.innerHTML = '';
            rarityOptions.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.val;
                o.innerText = opt.lab[currentLang];
                selectEl.appendChild(o);
            });
            if (cur) selectEl.value = cur;
        }

        function updateEffectSelect() {
            const selectEl = document.getElementById('edit-effectTag');
            const cur = selectEl.value;
            selectEl.innerHTML = '';
            effectOptions.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.val;
                o.innerText = `${opt.val} : ${opt.lab[currentLang]}`;
                selectEl.appendChild(o);
            });
            if (cur) selectEl.value = cur;
        }

        function initResizers() {
            const vResizer = document.getElementById('v-resizer'), hResizer = document.getElementById('h-resizer');
            const sidebar = document.getElementById('sidebar'), topPanel = document.getElementById('topPanel');
            const bottomPanel = document.getElementById('bottomPanel'), editorSection = document.getElementById('editorSection');
            let isResizingV = false, isResizingH = false;
            vResizer.addEventListener('mousedown', () => isResizingV = true);
            hResizer.addEventListener('mousedown', () => isResizingH = true);
            document.addEventListener('mousemove', (e) => {
                if (isResizingV) {
                    const w = e.clientX;
                    if (w > 200 && w < 600) sidebar.style.width = `${w}px`;
                }
                if (isResizingH) {
                    const rect = editorSection.getBoundingClientRect();
                    const y = e.clientY - rect.top, h = rect.height;
                    if (y > 100 && y < h - 50) {
                        topPanel.style.flex = y / h;
                        bottomPanel.style.flex = 1 - (y / h);
                    }
                }
            });
            document.addEventListener('mouseup', () => isResizingV = isResizingH = false);
        }

        function renderList() {
            const listEl = document.getElementById('cardList');
            document.getElementById('cardCount').innerText = cards.length;
            listEl.innerHTML = '';
            cards.forEach((card, i) => {
                const active = i === currentIndex;
                const div = document.createElement('div');
                div.className = `p-3 rounded border cursor-pointer transition flex items-center gap-3 ${active ? 'border-blue-500 bg-blue-50 ring-1 ring-blue-500' : 'border-gray-200 hover:border-blue-300'}`;
                div.onclick = () => loadEditor(i);
                const isUrl = card.img && card.img.startsWith('http');
                const imgHtml = isUrl ? `<img src="${card.img}" class="card-icon-img" onerror="this.outerHTML='<span>❓</span>'">` : `<span class="card-icon-emoji">${card.img || '❌'}</span>`;
                const name = (currentLang === 'ja' ? card.name.ja : card.name.zh) || card.name.zh || 'No Name';
                div.innerHTML = `<div class="card-icon-container">${imgHtml}</div><div class="flex-1 overflow-hidden"><div class="text-[10px] text-gray-400 font-mono truncate">${card.id || '(無 ID)'}</div><div class="font-bold text-sm truncate">${name}</div></div>`;
                listEl.appendChild(div);
            });
        }

        function loadEditor(index) {
            currentIndex = index;
            const card = cards[index];
            document.getElementById('noSelection').classList.add('hidden');
            document.getElementById('editorPanel').classList.remove('hidden');
            document.getElementById('edit-id').value = card.id || '';
            document.getElementById('edit-img').value = card.img || '';
            document.getElementById('edit-rarity').value = card.rarity;
            document.getElementById('edit-effectTag').value = card.effectTag || 'ALL';
            document.getElementById('edit-vbase').value = card.valueBase || 0;
            document.getElementById('edit-vpl').value = card.valuePerLevel || 0;
            document.getElementById('edit-vpl11').value = card.valuePerLevelLv11 || 0;
            document.getElementById('edit-name-zh').value = card.name.zh || '';
            document.getElementById('edit-name-ja').value = card.name.ja || '';
            document.getElementById('edit-desc-zh').value = card.desc.zh || '';
            document.getElementById('edit-desc-ja').value = card.desc.ja || '';
            updatePreview(); renderList();
        }

        function updateCurrentData() {
            if (currentIndex === -1) return;
            cards[currentIndex] = {
                id: document.getElementById('edit-id').value, 
                img: document.getElementById('edit-img').value,
                rarity: document.getElementById('edit-rarity').value, 
                effectTag: document.getElementById('edit-effectTag').value,
                valueBase: Number(document.getElementById('edit-vbase').value), 
                valuePerLevel: Number(document.getElementById('edit-vpl').value),
                valuePerLevelLv11: Number(document.getElementById('edit-vpl11').value),
                name: { zh: document.getElementById('edit-name-zh').value, ja: document.getElementById('edit-name-ja').value },
                desc: { zh: document.getElementById('edit-desc-zh').value, ja: document.getElementById('edit-desc-ja').value }
            };
            updatePreview(); renderList();
        }

        function addNewCard() {
            const newCard = { 
                id: "", 
                img: "❌", 
                rarity: "Hero", 
                effectTag: "ALL", 
                valueBase: 0, 
                valuePerLevel: 0, 
                valuePerLevelLv11: 0, 
                name: { zh: "新卡片", ja: "新カード" }, 
                desc: { zh: "效果內容 +{v}", ja: "効果内容 +{v}" } 
            };
            cards.push(newCard);
            loadEditor(cards.length - 1); 
            showToast(i18n[currentLang].msgAdded);
        }

        function handleDeleteCard() {
            if (currentIndex < 0 || currentIndex >= cards.length) return;
            const confirmed = confirm(i18n[currentLang].confirmDelete);
            if (!confirmed) return;
            cards.splice(currentIndex, 1);
            currentIndex = -1;
            document.getElementById('editorPanel').classList.add('hidden');
            document.getElementById('noSelection').classList.remove('hidden');
            renderList();
            updatePreview();
            showToast(i18n[currentLang].msgDeleted);
            if (isFbConnected && fbRef) fbRef.set(cards);
        }

        function formatByPath(arr) {
            const path = document.getElementById('configPath').value.trim();
            if (!path) return arr;
            const keys = path.split('.'), root = {};
            let cur = root;
            keys.forEach((k, i) => { if (i === keys.length - 1) cur[k] = arr; else { cur[k] = {}; cur = cur[k]; } });
            return root;
        }

        function updatePreview() { 
            const pre = document.getElementById('jsonPreview');
            if (pre) pre.textContent = JSON.stringify(formatByPath(cards), null, 2); 
        }

        function copyFullJSON() { copyToClipboard(JSON.stringify(formatByPath(cards), null, 2)); showToast(i18n[currentLang].msgCopied); }
        function copyCurrentJSON() { if (currentIndex === -1) return; copyToClipboard(JSON.stringify(cards[currentIndex], null, 2)); showToast(i18n[currentLang].msgCopied); }
        
        function copyToClipboard(txt) { 
            const el = document.createElement('textarea'); 
            el.value = txt; 
            document.body.appendChild(el); 
            el.select(); 
            document.execCommand('copy'); 
            document.body.removeChild(el); 
        }

        function importJSON() { document.getElementById('fileInput').click(); }
        
        function handleFileSelect(e) {
            const file = e.target.files[0]; 
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const json = JSON.parse(ev.target.result);
                    const path = document.getElementById('configPath').value.trim();
                    let data = json; 
                    if (path) path.split('.').forEach(k => { if (data && data[k]) data = data[k]; });
                    cards = Array.isArray(data) ? data : []; 
                    currentIndex = -1;
                    renderList(); 
                    updatePreview();
                    document.getElementById('editorPanel').classList.add('hidden'); 
                    document.getElementById('noSelection').classList.remove('hidden');
                    showToast(i18n[currentLang].msgImported);
                } catch (err) { showToast("Invalid JSON"); }
            };
            reader.readAsText(file);
        }

        function exportJSON() {
            if (cards.length === 0) return showToast(i18n[currentLang].noCards);
            const blob = new Blob([JSON.stringify(formatByPath(cards), null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob), a = document.createElement('a');
            a.href = url; a.download = `cards_${Date.now()}.json`; a.click(); showToast(i18n[currentLang].msgExported);
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); 
            if (!t) return;
            t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                if (t) t.classList.replace('opacity-100', 'opacity-0');
            }, 2000);
        }
    </script>
</body>
</html>
