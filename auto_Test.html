<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase GitHub Auth 測試</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #24292f; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #000; }
        #user-info { margin-top: 20px; display: none; }
        img { border-radius: 50%; width: 100px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>TOSM 專案登入測試</h2>
        
        <button id="login-btn">使用 GitHub 帳號登入</button>

        <div id="user-info">
            <img id="user-photo" src="" alt="User Avatar">
            <h3 id="user-name"></h3>
            <p id="user-email"></p>
            <button id="logout-btn" style="background-color: #d93025;">登出</button>
        </div>
    </div>

    <script type="module">
        // 引入 Firebase SDK 模組
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GithubAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. 填入你的 Firebase 配置 (請從 Firebase Console 複製)
        const firebaseConfig = {
  apiKey: "AIzaSyCxm-bJJGFgU9RWPOZf9CxIvvFBPMY82xw",
  authDomain: "my-firebase-project-f7414.firebaseapp.com",
  databaseURL: "https://my-firebase-project-f7414-default-rtdb.firebaseio.com",
  projectId: "my-firebase-project-f7414",
  storageBucket: "my-firebase-project-f7414.firebasestorage.app",
  messagingSenderId: "971826824573",
  appId: "1:971826824573:web:b94d98c7b49bb71e3df814"
};


        // 2. 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GithubAuthProvider();

        // 取得 UI 元素
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const userName = document.getElementById('user-name');
        const userEmail = document.getElementById('user-email');
        const userPhoto = document.getElementById('user-photo');

        // 3. 監聽登入狀態切換
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 使用者已登入
                loginBtn.style.display = 'none';
                userInfo.style.display = 'block';
                userName.innerText = `你好，${user.displayName}`;
                userEmail.innerText = user.email || "未提供公開 Email";
                userPhoto.src = user.photoURL;
            } else {
                // 使用者未登入
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
            }
        });

        // 4. 登入邏輯
        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("登入成功!", result.user);
                })
                .catch((error) => {
                    console.error("錯誤代碼:", error.code);
                    alert("登入失敗: " + error.message);
                });
        });

        // 5. 登出邏輯
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                alert("已成功登出");
            });
        });

    </script>
</body>
</html>
