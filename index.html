        body {
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }

        .sidebar-item.active {
            background-color: #2563eb;
            color: white;
        }

        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .loader {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #2563eb;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        :lang(ja) {
            word-break: break-all;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        /* 分頁按鈕樣式 */
        .pagination-btn {
            @apply px-4 py-2 rounded-xl font-bold transition-all border text-sm;
        }
        .pagination-btn.active {
            @apply bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-100;
        }
        .pagination-btn.inactive {
            @apply bg-white text-slate-500 border-slate-200 hover:bg-slate-50;
        }
        .pagination-btn.disabled {
            @apply opacity-30 cursor-not-allowed;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxm-bJJGFgU9RWPOZf9CxIvvFBPMY82xw",
            authDomain: "my-firebase-project-f7414.firebaseapp.com",
            databaseURL: "https://my-firebase-project-f7414-default-rtdb.firebaseio.com",
            projectId: "my-firebase-project-f7414",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.database = [];
        window.isDataLoaded = false;

        function updateUIStatus(status) {
            const statusTag = document.getElementById('status-tag');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (status === 'connected') {
                statusTag.className = "text-[10px] bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full font-bold border border-emerald-100 flex items-center";
                statusDot.className = "status-dot bg-emerald-600";
                statusText.innerText = "CONNECTED";
            } else if (status === 'error') {
                statusTag.className = "text-[10px] bg-red-50 text-red-600 px-3 py-1 rounded-full font-bold border border-red-100 flex items-center";
                statusDot.className = "status-dot bg-red-600";
                statusText.innerText = "OFFLINE";
            }
        }

        const cardRef = ref(db, 'tosm/data/card');
        onValue(cardRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.database = Array.isArray(data) ? data : Object.values(data);
                window.isDataLoaded = true;
                updateUIStatus('connected');
                document.getElementById('db-loader').classList.add('hidden');
                document.getElementById('card-grid').classList.remove('hidden');
                if (typeof window.performSearch === 'function') window.performSearch();
            }
        }, (error) => {
            updateUIStatus('error');
        });
    </script>

        { val: '53', lab: '忍耐アップ' },
        { val: '54', lab: '物理系の状態異常無視率' },
        { val: '55', lab: '元素系の状態異常無視率' },
        { val: '56', lab: '精神系の状態異常無視率' },
        { val: '57', lab: 'クポルの攻撃スキルダメージアップ' },
        { val: '58', lab: '精神系の状態異常の敵に対してダメージアップ' },
        { val: '59', lab: '元素系の状態異常の敵に対してダメージアップ' },
        { val: '60', lab: '物理系の状態異常の敵に対してダメージアップ' },
        { val: '61', lab: '自身の残りHPが少ないほどダメージ量アップ' },
        { val: '62', lab: '自身の残りHPが多いほどダメージ量アップ' }
    ]        
    };

        const i18n = { 
            zh: { navCards: "卡片", header: "救世者之樹M資料庫", search: "關鍵字", rarity: "稀有度", effect: "類型", level: "等級 (Lv.1~20)", limit: "顯示筆數", btnSearch: "查詢", btnReset: "重設", result: "找到 {n} 個結果 (第 {p} 頁)", noData: "查無此項資料", placeholder: "名稱...", lvLabel: "等級", options: { rarity: [ { val: 'ALL', lab: '全部 (All)' }, { val: 'Constellation', lab: '星座' }, { val: 'Goddess', lab: '女神' }, { val: 'Legend', lab: '傳說' }, { val: 'Hero', lab: '英雄' }, { val: 'Rare', lab: '稀少' }, { val: 'High', lab: '高級' }, { val: 'Normal', lab: '一般' }, { val: 'Training', lab: '修練' } ] } }, 
            ja: { navCards: "カード", header: "Tree of Savior M DB", search: "キーワード", rarity: "レア度", effect: "タイプ", level: "レベル (Lv.1~20)", limit: "表示数", btnSearch: "検索", btnReset: "リセット", result: "{n} 件の結果 (第 {p} ページ)", noData: "データが見つかりません", placeholder: "名前...", lvLabel: "Lv", options: { rarity: [ { val: 'ALL', lab: 'すべて (All)' }, { val: 'Constellation', lab: '星座' }, { val: 'Goddess', lab: '女神' }, { val: 'Legend', lab: '伝説' }, { val: 'Hero', lab: '英雄' }, { val: 'Rare', lab: 'レア' }, { val: 'High', lab: '高級' }, { val: 'Normal', lab: '一般' }, { val: 'Training', lab: '修練' } ] } } 
        };

        function changeLang(lang) {
            currentLang = lang;
            const btnZh = document.getElementById('lang-zh');
            const btnJa = document.getElementById('lang-ja');
            if (lang === 'zh') {
                btnZh.className = "flex-1 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white shadow-sm";
                btnJa.className = "flex-1 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700";
            } else {
                btnJa.className = "flex-1 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white shadow-sm";
                btnZh.className = "flex-1 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700";
            }
            updateStaticTexts();
            if (window.isDataLoaded) performSearch();
        }

        function updateStaticTexts() {
            const t = i18n[currentLang];
            document.getElementById('nav-cards-label').innerText = t.navCards;
            document.getElementById('header-title').innerText = t.header;
            document.getElementById('label-search').innerText = t.search;
            document.getElementById('label-rarity').innerText = t.rarity;
            document.getElementById('label-effect').innerText = t.effect;
            document.getElementById('label-level').innerText = t.level;
            document.getElementById('label-limit').innerText = t.limit;
            document.getElementById('btn-search-text').innerText = t.btnSearch;
            document.getElementById('reset-btn').innerText = t.btnReset;
            document.getElementById('query-input').placeholder = t.placeholder;

            const currentRarity = document.getElementById('rarity-select').value;
            const currentEffect = document.getElementById('effect-select').value;
            const raritySelect = document.getElementById('rarity-select');
            const effectSelect = document.getElementById('effect-select');
            
            raritySelect.innerHTML = t.options.rarity.map(o => `<option value="${o.val}">${o.lab}</option>`).join('');
            effectSelect.innerHTML = updatedEffectOptions[currentLang].map(o => `<option value="${o.val}">${o.lab}</option>`).join('');
            
            raritySelect.value = currentRarity || 'ALL';
            effectSelect.value = currentEffect || 'ALL';

            const limitSelect = document.getElementById('limit-select');
            const limitSuffix = currentLang === 'zh' ? ' 筆' : ' 件';
            Array.from(limitSelect.options).forEach(opt => {
                opt.text = opt.value + limitSuffix;
            });
        }

        function getRarityName(rarityVal) {
            const rarityObj = i18n[currentLang].options.rarity.find(o => o.val === rarityVal);
            return rarityObj ? rarityObj.lab : rarityVal;
        }

        window.performSearch = function(resetPage = true) {
            if (!window.isDataLoaded) return;
            if (resetPage) currentPage = 1;

            const query = document.getElementById('query-input').value.toLowerCase();
            const rarity = document.getElementById('rarity-select').value;
            const effect = document.getElementById('effect-select').value;
            const level = parseInt(document.getElementById('level-select').value);
            const limit = parseInt(document.getElementById('limit-select').value);

            filteredDatabase = window.database.filter(item => {
                const nameZh = (item.name && item.name.zh) || "";
                const nameJa = (item.name && item.name.ja) || "";
                return (nameZh.toLowerCase().includes(query) || nameJa.toLowerCase().includes(query)) &&
                       (rarity === 'ALL' || item.rarity === rarity) &&
                       (effect === 'ALL' || item.effectTag === effect);
            });
            
            updateDisplay(level, limit);
        }

        function updateDisplay(level, limit) {
            const totalFound = filteredDatabase.length;
            const totalPages = Math.ceil(totalFound / limit);
            
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * limit;
            const slicedData = filteredDatabase.slice(startIndex, startIndex + limit);
            
            renderGrid(slicedData, level, totalFound);
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination-container');
            if (totalPages <= 1) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            let html = '';
            html += `<button onclick="changePage(${currentPage - 1})" class="pagination-btn inactive ${currentPage === 1 ? 'disabled' : ''}" ${currentPage === 1 ? 'disabled' : ''}>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>`;

            let start = Math.max(1, currentPage - 2);
            let end = Math.min(totalPages, start + 4);
            if (end - start < 4) start = Math.max(1, end - 4);

            for (let i = start; i <= end; i++) {
                html += `<button onclick="changePage(${i})" class="pagination-btn ${i === currentPage ? 'active' : 'inactive'}">${i}</button>`;
            }

            html += `<button onclick="changePage(${currentPage + 1})" class="pagination-btn inactive ${currentPage === totalPages ? 'disabled' : ''}" ${currentPage === totalPages ? 'disabled' : ''}>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </button>`;

            container.innerHTML = html;
        }

        window.changePage = function(page) {
            currentPage = page;
            const level = parseInt(document.getElementById('level-select').value);
            const limit = parseInt(document.getElementById('limit-select').value);
            updateDisplay(level, limit);
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderGrid(items, level, totalFound) {
            const grid = document.getElementById('card-grid');
            document.getElementById('result-count').innerText = i18n[currentLang].result
                .replace('{n}', totalFound)
                .replace('{p}', currentPage);

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 font-medium">${i18n[currentLang].noData}</div>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                const name = (item.name && item.name[currentLang]) || (item.name && item.name.zh) || (item.name && item.name.ja) || "Unknown";
                const descTemplate = (item.desc && item.desc[currentLang]) || (item.desc && item.desc.zh) || (item.desc && item.desc.ja) || "No Info";
                
                const baseValue = item.valueBase || 0;
                const m1 = item.valuePerLevel || 0;
                const m2 = item.valuePerLevelLv11 !== undefined ? item.valuePerLevelLv11 : m1;
                let finalValue = (level <= 10) ? baseValue + (level - 1) * m1 : (baseValue + 9 * m1) + (level - 10) * m2;
                const finalDesc = descTemplate.replace('{v}', finalValue.toFixed(2));

                const imageContent = item.img && (item.img.startsWith('http') || item.img.startsWith('data:image'))
                    ? `<img src="${item.img}" class="h-28 w-28 object-contain">`
                    : `<span class="text-5xl">${item.img || '❌'}</span>`;

                return `
                <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden hover:border-blue-300 transition-all group relative flex flex-col h-full">
                    <div class="h-40 bg-slate-50 flex items-center justify-center relative shrink-0">
                        ${imageContent}
                        <span class="absolute top-3 right-3 text-base font-bold px-3 py-1 rounded-xl border ${getRarityStyle(item.rarity)}">${getRarityName(item.rarity)}</span>
                        <span class="absolute bottom-3 left-3 bg-white/90 border border-slate-100 text-blue-600 px-3 py-1 rounded-lg text-base font-black shadow-sm">${i18n[currentLang].lvLabel} ${level}</span>
                    </div>
                    <div class="p-6 flex flex-col flex-1">
                        <div class="mb-4 min-h-[3rem]"><h3 class="font-bold text-slate-800 text-base line-clamp-2">${name}</h3></div>
                        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex-1 flex items-center">
                            <p class="text-xs text-slate-500 font-medium leading-relaxed">${finalDesc}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function getRarityStyle(r) {
            const styles = { Legend: 'bg-amber-50 text-amber-600 border-amber-200', Hero: 'bg-red-50 text-red-600 border-red-200', Rare: 'bg-purple-50 text-purple-600 border-purple-200', High: 'bg-blue-50 text-blue-600 border-blue-200', Constellation: 'bg-indigo-900 text-white border-indigo-950', Goddess: 'bg-sky-50 text-sky-600 border-sky-200', Normal: 'bg-emerald-50 text-emerald-600 border-emerald-200', Training: 'bg-slate-100 text-slate-500 border-slate-300' };
            return styles[r] || 'bg-slate-50 text-slate-400 border-slate-200';
        }

        window.onload = () => {
            // 初始化等級選項
            document.getElementById('level-select').innerHTML = Array.from({length: 20}, (_, i) => `<option value="${i+1}" ${i+1===10 ? 'selected' : ''}>Lv. ${i+1}</option>`).join('');
            
            // 自動偵測預設語言功能
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.toLowerCase().startsWith('ja')) {
                changeLang('ja');
            } else {
                updateStaticTexts();
            }

            // 綁定事件
            document.getElementById('search-btn').onclick = () => window.performSearch(true);
            document.getElementById('reset-btn').onclick = () => { 
                document.getElementById('query-input').value = ''; 
                document.getElementById('rarity-select').value = 'ALL';
                document.getElementById('effect-select').value = 'ALL';
                document.getElementById('level-select').value = '10';
                document.getElementById('limit-select').value = '6';
                performSearch(true); 
            };
            document.getElementById('level-select').onchange = () => window.performSearch(false);
            document.getElementById('rarity-select').onchange = () => window.performSearch(true);
            document.getElementById('effect-select').onchange = () => window.performSearch(true);
            document.getElementById('limit-select').onchange = () => window.performSearch(true);
            
            document.getElementById('query-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') window.performSearch(true);
            });
        };
    </script>
</body>
</html>
