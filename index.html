<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救世者之樹M資料庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b border-slate-100">
            <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <span>TOSM DB</span>
            </h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-1">
            <button class="sidebar-item active w-full text-left px-4 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                </svg>
                <span id="nav-cards-label">卡片</span>
            </button>
        </nav>

        <div class="p-4 bg-slate-50 border-t border-slate-100">
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">Language / 語言</label>
            <div class="flex p-1 bg-white rounded-xl border border-slate-200">
                <button id="lang-zh" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all">中文</button>
                <button id="lang-ja" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all">日本語</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-slate-50/50">
        <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-30 px-8 flex items-center justify-between">
            <h2 id="header-title" class="font-bold text-slate-700 text-lg">救世者之樹M資料庫</h2>
            <div id="status-container" class="flex items-center gap-2">
                <div id="status-tag" class="status-badge-connecting">
                    <span id="status-dot" class="status-dot bg-blue-600 animate-pulse"></span>
                    <span id="status-text">CONNECTING</span>
                </div>
            </div>
        </header>

        <div id="app-container" class="p-8 max-w-6xl mx-auto pb-12">
            <div id="search-module" class="bg-white rounded-3xl p-8 card-shadow border border-slate-200">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div>
                        <label id="label-level" class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">等級</label>
                        <select id="level-select" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-blue-600 outline-none cursor-pointer"></select>
                    </div>
                    <div class="md:col-span-2">
                        <label id="label-effect" class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">類型</label>
                        <select id="effect-select" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm outline-none cursor-pointer"></select>
                    </div>
                    <div>
                        <label id="label-rarity" class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">稀有度</label>
                        <select id="rarity-select" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm outline-none cursor-pointer"></select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end border-t border-slate-100 pt-6">
                    <div class="md:col-span-6">
                        <label id="label-search" class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">關鍵字</label>
                        <input type="text" id="query-input" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div class="md:col-span-2">
                        <label id="label-limit" class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">顯示筆數</label>
                        <select id="limit-select" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold">
                            <option value="3">3 筆</option>
                            <option value="6" selected>6 筆</option>
                            <option value="12">12 筆</option>
                            <option value="30">30 筆</option>
                        </select>
                    </div>
                    <div class="md:col-span-4 flex items-center justify-end gap-3 h-[50px]">
                        <button id="reset-btn" class="px-4 py-3 text-sm font-bold text-slate-400 hover:text-slate-600">重設</button>
                        <button id="search-btn" class="bg-slate-900 hover:bg-slate-800 text-white px-8 h-full rounded-2xl font-bold shadow-lg transition-all">
                            <span id="btn-search-text">查詢</span>
                        </button>
                    </div>
                </div>

                <div class="mt-4">
                    <span id="result-count" class="text-xs text-slate-400 font-medium">資料載入中...</span>
                </div>

                <div id="db-loader" class="flex flex-col items-center justify-center py-20">
                    <div class="loader !w-10 !h-10 !border-4 mb-4"></div>
                    <p class="text-slate-400 text-sm font-medium animate-pulse">Connecting to Firebase...</p>
                </div>

                <div id="card-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10 hidden"></div>
                <div id="pagination-container" class="mt-12 flex justify-center items-center gap-2 hidden border-t border-slate-50 pt-8"></div>
            </div>

            <footer class="mt-12 text-center pb-8">
                <p class="text-[11px] font-bold text-slate-400 tracking-wide uppercase">Ⓒ IMCGAMES CO., LTD. All Rights Reserved.</p>
            </footer>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
